name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Ensures PRs from forks can still run (no special perms needed for artifacts)
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
      # If your project uses a lockfile (package-lock.json), keep npm ci; otherwise use npm i
        run: npm ci

      - name: Install Playwright browsers & OS dependencies
        run: npx playwright install --with-deps

      # Optional: If your tests need a display (most UI tests do)
      # Playwright usually handles headless mode, but xvfb is handy for some native dialogs
      - name: Run Playwright tests
        env:
          CI: true
        run: |
          # Collect traces, videos, screenshots for debugging
          npx playwright test --reporter=line
        # If you prefer HTML report generation AFTER the run:
        # run: |
        #   npx playwright test --reporter=html,line

      # Upload the HTML report even if tests fail/cancel
      - name: Upload Playwright HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      # Upload test artifacts (videos, screenshots, traces) if you store them under test-results
      - name: Upload Playwright test results (videos/screenshots/traces)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/
          retention-days: 14
          if-no-files-found: ignore